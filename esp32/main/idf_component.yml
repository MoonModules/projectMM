dependencies:
  espressif/mdns:
    version: "*"
  joltwallet/littlefs:
    version: "^1.16.0"
  improv/improv:
    version: "^1.2.5"
  # IP101 Ethernet PHY for the ESP32-P4-NANO. IDF v6 moved the per-PHY drivers
  # out of esp_eth core into managed components; only referenced on the P4 build
  # (ethInit's IP101 ctor is behind `#ifdef CONFIG_IDF_TARGET_ESP32P4`; the
  # generic PHY, Olimex LAN8720, stays in core). The `rules` gate scopes the
  # *dependency* to the P4 too — without it, every target tries to resolve ip101
  # even though only the P4 compiles the symbol, and the **S3 build fails the
  # solve**: ip101 is an EMAC PHY, the registry has no esp32s3-compatible version
  # (the S3 has no internal EMAC), so `^1.0.0` "doesn't match any versions". The
  # classic/P4 (which have an EMAC) resolve it fine, but the gate is still correct
  # for them since they never compile it. Only bites in a fresh CI solve; a local
  # build with a committed lock masks it.
  espressif/ip101:
    version: "^1.0.0"
    rules:
      - if: "target == esp32p4"
  # W5500 external SPI Ethernet PHY+MAC for the ESP32-S3 boards (SE16, LightCrafter).
  # IDF v6 moved the per-PHY SPI drivers out of esp_eth core into managed components
  # (same migration as ip101 above); ethInit's W5500 path (platform_esp32.cpp, behind
  # MM_ETH_W5500 = SPI-eth enabled AND no internal EMAC) needs esp_eth_mac_new_w5500 /
  # esp_eth_phy_new_w5500 from here. The `rules` gate scopes the dependency to the S3:
  # the W5500 is the S3's only Ethernet (it has no EMAC), and gating avoids classic/P4
  # builds resolving a component they never compile.
  espressif/w5500:
    version: "^1.0.0"
    rules:
      - if: "target == esp32s3"
  # esp-dsp — Espressif's signal-processing library; we use its float radix-2 FFT
  # (dsps_fft2r_fc32) for the microphone spectrum. Float (not fixed-point) because
  # every mic-capable target here has an FPU, where float is faster. Referenced
  # only from platform_esp32_i2s.cpp's audioFft.
  espressif/esp-dsp:
    version: "^1.5.0"
  # esp_wifi_remote + esp_hosted — WiFi for the ESP32-P4 via the on-board ESP32-C6
  # co-processor over SDIO. The P4 has no native radio; these present the C6's
  # radio through the standard esp_wifi_* API (API-compatible, so the WiFi seam in
  # platform_esp32.cpp is unchanged; esp_hosted self-inits at boot, no bring-up
  # code needed). DELIBERATE v6.0-floor exception (docs/building.md § ESP-IDF
  # version): these are managed components outside mainline v6.0, accepted
  # explicitly. The `rules` gate pulls them ONLY when CONFIG_MM_P4_WIFI is set
  # (declared in main/Kconfig.projbuild, set by sdkconfig.defaults.esp32p4-eth-wifi)
  # — i.e. the WiFi build only. Gating on `target == esp32p4` alone was WRONG: it
  # also pulled them into the Ethernet-only esp32p4-eth build, where esp_hosted's
  # boot-time self-init claims the default netif and breaks the EMAC Ethernet DHCP
  # (link up, no IP — bench-found 2026-06-15). Versions pinned to patch-level (the
  # versions validated on the P4-NANO bench) so the build doesn't drift to a new minor.
  espressif/esp_wifi_remote:
    version: "~1.6.1"
    rules:
      - if: "CONFIG_MM_P4_WIFI == True"
  espressif/esp_hosted:
    version: "~2.12.9"
    rules:
      - if: "CONFIG_MM_P4_WIFI == True"
