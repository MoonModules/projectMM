name: Release

# Tag-triggered release pipeline. Builds 4 ESP32 firmwares + 2 desktop binaries
# in parallel, generates 4 ESP Web Tools manifests, attaches everything to the
# GitHub release, and deploys the installer page to GitHub Pages.
#
# Workflow: maintainer bumps library.json → git tag vX.Y.Z → push tag.
# CI fails fast if the tag and library.json disagree (verify-version job).
#
# Manual replay: workflow_dispatch with an existing tag, useful for retries
# after a transient runner failure (CI is the only producer of release assets;
# never upload by hand).

on:
  push:
    tags:
      - 'v*'
      - 'nightly-*'
    # On-push CI on main: catches breakage between tags. The release job
    # below is gated on `startsWith(github.ref, 'refs/tags/')` || dispatch,
    # so a plain push to main only exercises the builds — no release page,
    # no Pages deploy. Nightly tags (cron in nightly.yml) cover the
    # in-between snapshot use case; feature-branch CI is provided by each
    # PR's own checks (CodeRabbit + reviewer agent), not by this workflow.
    branches:
      - main
    paths:
      - 'src/**'
      - 'esp32/**'
      - 'scripts/build/**'
      - 'CMakeLists.txt'
      - 'library.json'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v1.0.0'
        required: true

# Run one release at a time per tag — prevents two concurrent runs from
# racing on the same release page or Pages deployment. Branch pushes get
# their own concurrency group so a tag and a branch can build in parallel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Minimal default permissions for every job (read-only). The release job
# overrides this locally with the write/id-token scopes it needs to publish
# the GitHub release + deploy Pages. Verify and build jobs inherit read-only,
# which is all they need (checkout + artifact upload via OIDC).
permissions:
  contents: read

jobs:
  verify-version:
    # The job runs on every trigger (so the build jobs' `needs: verify-version`
    # is satisfied — GitHub's default `needs:` treats a skipped dependency as
    # a blocking state). The verification step inside only executes on a tag
    # push or workflow_dispatch, where there's actually a tag to check against.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches library.json version
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        # Pass the tag via --tag arg, not via an env var named GITHUB_REF_NAME.
        # The built-in GITHUB_REF_NAME is "main" on a workflow_dispatch from
        # main and was shadowing the step-level env: override in practice
        # (verified on run 26406224226 — env: said v1.0.0-rc1 but Python read
        # "main"). Explicit CLI arg sidesteps the collision.
        #
        # The expression is plumbed via a step-level env var so the shell sees
        # a properly-quoted "$TAG" instead of interpolating template text
        # directly into the run line — same pattern the release job below
        # uses for $REPO. Same value either way; the indirection silences
        # the static analyser's template-injection warning.
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: python scripts/build/verify_version.py --tag "$TAG"

  build-esp32:
    needs: verify-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [esp32, esp32-eth, esp32-eth-wifi, esp32s3-n16r8]
    steps:
      - uses: actions/checkout@v4

      - name: Cache ESP-IDF tooling
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ~/esp/esp-idf
          # Bump the suffix when changing the IDF version to invalidate.
          key: esp-idf-v6.1-dev-${{ runner.os }}-v1

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          # Match the local development IDF (v6.1-dev-399-gd1b91b79b5 today).
          # The project uses v6-era APIs — `esp_eth_phy_new_generic`, the new
          # mDNS component manager, `int clock_gpio` in the EMAC config (v5.x
          # had a strongly-typed enum). v5.4 fails to compile platform_esp32.cpp.
          # `v6.1-dev` is a rolling Docker tag on espressif/idf that tracks the
          # v6.1 dev line — close enough to the pinned SHA for CI today.
          esp_idf_version: v6.1-dev
          # Any board whose key starts with `esp32s3` targets the S3.
          target: ${{ startsWith(matrix.board, 'esp32s3') && 'esp32s3' || 'esp32' }}
          path: 'esp32'
          # We run our own builder (not the action's default `idf.py build`)
          # so the sdkconfig fragments and EXCLUDE_COMPONENTS go through the
          # same code path as local builds.
          command: python ../scripts/build/build_esp32.py --board ${{ matrix.board }}

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          V=$(jq -r .version library.json)
          # Per-board build dir under build/esp32-<board>/ (plan-19.1).
          # build_esp32.py points idf.py at this dir via -B, so the build
          # tree lives outside esp32/ and multiple boards can coexist —
          # CI uses one per matrix job, dev machines use as many as built.
          B=build/esp32-${{ matrix.board }}
          PREFIX="firmware-${{ matrix.board }}-v$V"
          cp "$B/projectMM.bin"                       "dist/${PREFIX}.bin"
          cp "$B/bootloader/bootloader.bin"           "dist/${PREFIX}-bootloader.bin"
          cp "$B/partition_table/partition-table.bin" "dist/${PREFIX}-partition-table.bin"
          cp "$B/ota_data_initial.bin"                "dist/${PREFIX}-ota-data.bin"
          # Per-board flasher_args.json — the release job feeds it to
          # generate_manifest.py so offsets come from the real build.
          cp "$B/flasher_args.json"                   "dist/flasher-${{ matrix.board }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: esp32-${{ matrix.board }}
          path: dist/

  build-macos:
    needs: verify-version
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build + package macOS arm64
        run: python scripts/build/package_desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: dist/

  # build-windows: pending Windows platform-layer port. See docs/plan.md
  # "Windows desktop port (blocker for 1.0 Windows binary)". The job was
  # removed (rather than left red) so the release pipeline can produce a
  # tagged 1.0 from the matching `dist/projectMM-macos-arm64-vX.Y.Z.tar.gz`
  # + the four ESP32 firmwares. Re-add the build-windows job and the
  # corresponding `dist/projectMM-*.zip` glob in `release` once the port
  # lands; the surrounding scaffolding stays identical.

  release:
    # Tag/dispatch only — branch pushes exercise the builds but never
    # publish a GitHub Release or deploy to Pages.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [build-esp32, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write     # softprops/action-gh-release needs this
      pages: write        # actions/deploy-pages needs this
      id-token: write     # actions/deploy-pages needs this (OIDC for Pages)
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into dist/
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f -exec mv {} dist/ \;
          ls -la dist/

      - name: Generate ESP Web Tools manifests (release-asset + Pages-relative)
        env:
          # workflow_dispatch passes the tag through inputs; push events
          # use the ref directly. Either way TAG is the bare "vX.Y.Z".
          # REPO is owner/repo, plumbed via env to avoid the static-analyser
          # flagging the direct ${{ github.repository }} expansion inside a
          # shell string. (github.repository isn't attacker-controlled, but
          # keeping the indirection consistent with TAG silences the warning.)
          TAG: ${{ inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          V=$(jq -r .version library.json)
          # Two sets of manifests:
          #   dist/manifest-*.json      → absolute GitHub release-asset URLs.
          #                               Uploaded as release assets; read by
          #                               the on-device OTA picker (device
          #                               fetches the .bin directly — no CORS).
          #   pages-manifests/*.json    → relative paths (.bin alongside the
          #                               manifest). Used by the web installer,
          #                               which is same-origin-bound by CORS.
          BASE="https://github.com/${REPO}/releases/download/$TAG"
          mkdir -p pages-manifests
          for B in esp32 esp32-eth esp32-eth-wifi esp32s3-n16r8; do
            python scripts/build/generate_manifest.py \
              --board "$B" \
              --version "$V" \
              --release-url "$BASE" \
              --flasher-args "dist/flasher-$B.json" \
              --out "dist/manifest-$B.json"
            python scripts/build/generate_manifest.py \
              --board "$B" \
              --version "$V" \
              --release-url . \
              --flasher-args "dist/flasher-$B.json" \
              --out "pages-manifests/manifest-$B.json"
          done

      # Pages deploy: every tag (stable + RC). The web installer page reads
      # api.github.com to populate its release dropdown; the cumulative-content
      # step below keeps the last 5 stable + 5 prerelease releases on Pages
      # so those binaries are flashable (Web Serial is CORS-bound and GitHub
      # release assets don't return CORS headers — see plan-18 Context).
      # End users see Stable selected by default; RC is opt-in via the
      # channel dropdown.
      - name: Stage cumulative release content
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Last 5 stable + last 5 prerelease tags.
          STABLE=$(gh release list --limit 50 --exclude-drafts \
                   --json tagName,isPrerelease \
                   | jq -r '.[] | select(.isPrerelease|not) | .tagName' | head -5)
          PRE=$(gh release list --limit 50 --exclude-drafts \
                --json tagName,isPrerelease \
                | jq -r '.[] | select(.isPrerelease) | .tagName' | head -5)
          KEEP=$(printf '%s\n%s\n' "$STABLE" "$PRE" | sort -u)
          echo "Releases to keep on Pages:"
          echo "$KEEP" | sed 's/^/  /'

          for T in $KEEP; do
            mkdir -p "pages/install/releases/$T"
            # Tolerate the current tag failing here — its release isn't
            # published yet (softprops/action-gh-release runs later in this
            # job); we stage its binaries from local dist/ a few lines below.
            gh release download "$T" \
              --dir "pages/install/releases/$T" \
              --pattern 'firmware-*.bin' \
              --pattern 'manifest-*.json' \
              --pattern 'projectMM-*.tar.gz' \
              || echo "  (skip $T — not yet released or no matching assets)"
          done

          # Stage the current release from local dist/ + pages-manifests/.
          # The current tag's release-publish step runs after this, so a
          # `gh release download` for $TAG would return nothing.
          mkdir -p "pages/install/releases/$TAG"
          cp dist/firmware-*.bin                   "pages/install/releases/$TAG/" || true
          cp pages-manifests/manifest-*.json       "pages/install/releases/$TAG/"
          cp dist/projectMM-*.tar.gz               "pages/install/releases/$TAG/" || true

          echo "Pages release tree:"
          find pages/install/releases -maxdepth 2 -type f | sort

      - name: Stage GitHub Pages site
        run: |
          set -euo pipefail
          # Install page + the shared release-picker module sit at the root.
          # Each release's binaries + manifests live under releases/<tag>/.
          mkdir -p pages/install
          cp -r docs/install/. pages/install/
          cp src/ui/release-picker.js pages/install/
          ls -la pages/install/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          # Mark vX.Y.Z-rcN and nightly-* tags as pre-releases — they land
          # on the Releases page sorted below stable releases and aren't
          # picked up by tooling that asks for "latest". Stable tags publish
          # normally. The picker labels both as "(beta)"; the visual
          # distinction is in the tag name (v1.0.0-rc1 vs nightly-2026-05-26).
          #
          # Source the test from `inputs.tag || github.ref_name` once: on
          # workflow_dispatch github.ref is "refs/heads/<branch>" (the
          # dispatching branch) and would never match, so a pure github.ref
          # test would silently mark dispatched RCs as stable. The
          # `inputs.tag || github.ref_name` expression resolves to the
          # actual tag in both trigger paths.
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-rc')
                          || contains(inputs.tag || github.ref_name, 'nightly-') }}
          fail_on_unmatched_files: true
          # The `files:` block below is a multi-line literal string — every line
          # is a glob pattern, the action does NOT strip `#` as comment syntax.
          # Add `dist/projectMM-*.zip` back when build-windows is restored
          # (see docs/plan.md "Windows desktop port").
          files: |
            dist/firmware-*.bin
            dist/manifest-*.json
            dist/projectMM-*.tar.gz

      - id: deploy-pages
        uses: actions/deploy-pages@v4
