name: Nightly

# Daily snapshot of main HEAD. Calls release.yml via workflow_dispatch with
# tag=nightly-YYYY-MM-DD; release.yml does the actual build + publish + Pages
# deploy and creates the git tag as a side effect of `softprops/action-gh-release`.
# Skip when main HEAD hasn't moved since the last nightly. Old nightlies are
# pruned to seven days so the GitHub releases page stays tidy.
#
# WHY NOT push a tag from this workflow and let release.yml's `on: push: tags`
# fire? Because pushes authenticated with the default GITHUB_TOKEN explicitly
# DO NOT trigger downstream workflow runs — GitHub's "GITHUB_TOKEN doesn't
# trigger workflows" rule. workflow_dispatch via the gh API IS exempt from
# that rule, so dispatching release.yml directly is the canonical fix that
# doesn't need a personal-access-token secret.

on:
  schedule:
    # 04:00 UTC — early morning Europe, overnight US, off-peak globally.
    # GitHub Actions schedules are best-effort and can drift by minutes;
    # nightlies don't need wall-clock precision.
    - cron: '0 4 * * *'
  workflow_dispatch: {}

# Default GITHUB_TOKEN gets the per-job permissions below.
# Repo Settings → Actions → Workflow permissions must allow write for the
# release-delete calls in the cleanup job to succeed.
permissions:
  contents: read

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.diff.outputs.should-build }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST=$(gh release list --limit 50 --json tagName \
                   | jq -r '.[] | .tagName | select(startswith("nightly-"))' \
                   | head -1)
          if [ -z "$LATEST" ]; then
            echo "No prior nightly — building."
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # If main HEAD == the commit the latest nightly tag points at, skip.
          # Tag may be missing locally (the prior run deleted it; only the
          # release survives) — treat that as "should re-build".
          LATEST_SHA=$(git rev-parse "$LATEST^{commit}" 2>/dev/null || echo "")
          MAIN_SHA=$(git rev-parse origin/main)
          echo "Latest nightly: $LATEST ($LATEST_SHA)"
          echo "main HEAD:      $MAIN_SHA"
          if [ "$LATEST_SHA" = "$MAIN_SHA" ]; then
            echo "main hasn't moved — skipping nightly."
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          else
            echo "main has moved — will dispatch release.yml."
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          fi

  dispatch-release:
    needs: check-changes
    if: needs.check-changes.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    permissions:
      # actions: write is what `gh workflow run` needs against the API.
      # contents stays read — we don't push tags from this workflow anymore,
      # release.yml will create the tag as part of `softprops/action-gh-release`.
      actions: write
      contents: read
    steps:
      - name: Dispatch release.yml for today's nightly tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicit --repo on every gh call below. Without it gh tries to
          # infer the repo from `git remote -v`, which needs a checkout —
          # and this job deliberately doesn't run actions/checkout (saves
          # ~5 s; the job only makes API calls). github.repository is
          # always set in the GitHub Actions environment.
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="nightly-$(date -u +%Y-%m-%d)"
          # Idempotency: if today's tag already has a release (a second
          # dispatch on the same UTC day), skip rather than re-publishing.
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping dispatch."
            exit 0
          fi
          echo "Dispatching release.yml with tag=$TAG ..."
          # gh workflow run uses the GITHUB_TOKEN; workflow_dispatch via the
          # API IS exempt from the "GITHUB_TOKEN doesn't trigger workflows"
          # rule (the rule applies to push/tag events, not API dispatches).
          gh workflow run release.yml --repo "$REPO" --ref main -f tag="$TAG"
          echo "release.yml dispatched; it will tag main HEAD via softprops/action-gh-release."

  cleanup:
    # Independent of dispatch-release — old nightlies should be pruned even
    # on days where main didn't move (so they age out steadily). Runs in
    # parallel with dispatch-release; gh release delete doesn't conflict
    # with the dispatched release.yml's gh release create (different tags).
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release delete --cleanup-tag deletes the git tag too
    steps:
      - uses: actions/checkout@v4
      - name: Delete nightly releases older than 7 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # GNU date on the Ubuntu runner; BSD date (-v -7d) on macOS is the
          # fallback shape, documented for local debugging — Ubuntu doesn't
          # need the second branch.
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Cutoff: $CUTOFF (UTC)"
          gh release list --limit 50 --json tagName,createdAt \
            | jq -r --arg cutoff "$CUTOFF" \
                '.[] | select(.tagName | startswith("nightly-"))
                     | select(.createdAt < $cutoff) | .tagName' \
            | while read -r TAG; do
                [ -z "$TAG" ] && continue
                echo "Deleting old nightly $TAG ..."
                # --cleanup-tag removes both the release and the underlying
                # git tag. Without it the tags would accumulate forever.
                gh release delete "$TAG" --yes --cleanup-tag
              done
          echo "Cleanup done."
