name: Nightly

# Daily snapshot of main HEAD. Tags as `nightly-YYYY-MM-DD` and pushes the
# tag; the tag push fires release.yml (via its `tags: ['v*', 'nightly-*']`
# trigger), which does the actual build + publish + Pages deploy. Skip
# when main HEAD hasn't moved since the last nightly. Old nightlies are
# pruned to seven days so the GitHub releases page stays tidy.

on:
  schedule:
    # 04:00 UTC — early morning Europe, overnight US, off-peak globally.
    # GitHub Actions schedules are best-effort and can drift by minutes;
    # nightlies don't need wall-clock precision.
    - cron: '0 4 * * *'
  workflow_dispatch: {}

# Default GITHUB_TOKEN gets contents: write via the per-job overrides below.
# Repo Settings → Actions → Workflow permissions must allow write for the
# tag-push + release-delete calls to succeed.
permissions:
  contents: read

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should-tag: ${{ steps.diff.outputs.should-tag }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST=$(gh release list --limit 50 --json tagName \
                   | jq -r '.[] | .tagName | select(startswith("nightly-"))' \
                   | head -1)
          if [ -z "$LATEST" ]; then
            echo "No prior nightly — tagging."
            echo "should-tag=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # If main HEAD == the commit the latest nightly tag points at, skip.
          # Tag may be missing locally (the prior run deleted it; only the
          # release survives) — treat that as "should re-tag".
          LATEST_SHA=$(git rev-parse "$LATEST^{commit}" 2>/dev/null || echo "")
          MAIN_SHA=$(git rev-parse origin/main)
          echo "Latest nightly: $LATEST ($LATEST_SHA)"
          echo "main HEAD:      $MAIN_SHA"
          if [ "$LATEST_SHA" = "$MAIN_SHA" ]; then
            echo "main hasn't moved — skipping nightly."
            echo "should-tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "main has moved — will tag."
            echo "should-tag=true" >> "$GITHUB_OUTPUT"
          fi

  create-tag:
    needs: check-changes
    if: needs.check-changes.outputs.should-tag == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to push the tag
    steps:
      - uses: actions/checkout@v4
        with: { ref: main, fetch-depth: 0 }
      - name: Tag main HEAD and push
        run: |
          set -euo pipefail
          TAG="nightly-$(date -u +%Y-%m-%d)"
          # Idempotency: if today's tag already exists (a second dispatch on
          # the same UTC day), don't try to re-create. The release.yml will
          # overwrite the assets if you re-dispatch IT with the same tag.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping push."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Pushed $TAG — release.yml will pick up the tag push."

  cleanup:
    # Independent of create-tag — old nightlies should be pruned even on
    # days where main didn't move (so they age out steadily). Runs in
    # parallel with create-tag; gh release delete doesn't conflict with
    # gh release create (different tags).
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release delete --cleanup-tag deletes the git tag too
    steps:
      - uses: actions/checkout@v4
      - name: Delete nightly releases older than 7 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # GNU date on the Ubuntu runner; BSD date (-v -7d) on macOS is the
          # fallback shape, documented for local debugging — Ubuntu doesn't
          # need the second branch.
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Cutoff: $CUTOFF (UTC)"
          DELETED=0
          gh release list --limit 50 --json tagName,createdAt \
            | jq -r --arg cutoff "$CUTOFF" \
                '.[] | select(.tagName | startswith("nightly-"))
                     | select(.createdAt < $cutoff) | .tagName' \
            | while read -r TAG; do
                [ -z "$TAG" ] && continue
                echo "Deleting old nightly $TAG ..."
                # --cleanup-tag removes both the release and the underlying
                # git tag. Without it the tags would accumulate forever.
                gh release delete "$TAG" --yes --cleanup-tag
                DELETED=$((DELETED + 1))
              done
          echo "Cleanup done."
